name: Rollback Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  simulate-rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run rollback drill
        run: ./scripts/rollback-drill.sh
